version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: oai-mysql
    environment:
      MYSQL_DATABASE:      oai_db
      MYSQL_USER:          oai_user
      MYSQL_PASSWORD:      oai_passwd
      MYSQL_ROOT_PASSWORD: linux
    volumes:
      - ./oai_db.sql:/docker-entrypoint-initdb.d/oai_db.sql:ro
    networks:
      oai-public-net:
        ipv4_address: 192.168.70.131
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  oai-nrf:
    image: oaisoftwarealliance/oai-nrf:v2.0.0
    container_name: oai-nrf
    environment:
      - TZ=Europe/Paris
      - NRF_INTERFACE_NAME_FOR_SBI=eth0
      - NRF_INTERFACE_PORT_FOR_SBI=80
      - NRF_INTERFACE_HTTP2_PORT_FOR_SBI=8080
      - NRF_API_VERSION=v1
      - INSTANCE=0
      - LOG_LEVEL=debug
    networks:
      oai-public-net:
        ipv4_address: 192.168.70.130
    healthcheck:
      test: ["CMD-SHELL", "netstat -tnlp 2>/dev/null | grep 8080 || ss -tnlp | grep 8080"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  oai-udr:
    image: oaisoftwarealliance/oai-udr:v2.0.0
    container_name: oai-udr
    depends_on:
      mysql:
        condition: service_healthy
      oai-nrf:
        condition: service_healthy
    environment:
      - TZ=Europe/Paris
      - UDR_NAME=OAI_UDR
      - UDR_INTERFACE_NAME_FOR_NUDR=eth0
      - UDR_INTERFACE_PORT_FOR_NUDR=80
      - UDR_INTERFACE_HTTP2_PORT_FOR_NUDR=8080
      - UDR_API_VERSION=v1
      - REGISTER_NRF=yes
      - NRF_IPV4_ADDRESS=192.168.70.130
      - NRF_PORT=80
      - NRF_API_VERSION=v1
      - NRF_FQDN=oai-nrf
      - USE_FQDN_DNS=yes
      - MYSQL_IPV4_ADDRESS=192.168.70.131
      - MYSQL_USER=oai_user
      - MYSQL_PASS=oai_passwd
      - MYSQL_DB=oai_db
      - INSTANCE=0
      - LOG_LEVEL=debug
    networks:
      oai-public-net:
        ipv4_address: 192.168.70.136
    restart: unless-stopped

  oai-udm:
    image: oaisoftwarealliance/oai-udm:v2.0.0
    container_name: oai-udm
    depends_on:
      oai-udr:
        condition: service_started
    environment:
      - TZ=Europe/Paris
      - UDM_NAME=OAI_UDM
      - UDM_INTERFACE_NAME_FOR_NUDM=eth0
      - UDM_INTERFACE_PORT_FOR_NUDM=80
      - UDM_INTERFACE_HTTP2_PORT_FOR_NUDM=8080
      - UDM_API_VERSION=v1
      - REGISTER_NRF=yes
      - NRF_IPV4_ADDRESS=192.168.70.130
      - NRF_PORT=80
      - NRF_API_VERSION=v1
      - NRF_FQDN=oai-nrf
      - USE_FQDN_DNS=yes
      - INSTANCE=0
      - LOG_LEVEL=debug
    networks:
      oai-public-net:
        ipv4_address: 192.168.70.137
    restart: unless-stopped

  oai-ausf:
    image: oaisoftwarealliance/oai-ausf:v2.0.0
    container_name: oai-ausf
    depends_on:
      oai-udm:
        condition: service_started
    environment:
      - TZ=Europe/Paris
      - AUSF_NAME=OAI_AUSF
      - AUSF_INTERFACE_NAME_FOR_NAUSF=eth0
      - AUSF_INTERFACE_PORT_FOR_NAUSF=80
      - AUSF_INTERFACE_HTTP2_PORT_FOR_NAUSF=8080
      - AUSF_API_VERSION=v1
      - REGISTER_NRF=yes
      - NRF_IPV4_ADDRESS=192.168.70.130
      - NRF_PORT=80
      - NRF_API_VERSION=v1
      - NRF_FQDN=oai-nrf
      - USE_FQDN_DNS=yes
      - INSTANCE=0
      - LOG_LEVEL=debug
    networks:
      oai-public-net:
        ipv4_address: 192.168.70.138
    restart: unless-stopped

  oai-amf:
    image: oaisoftwarealliance/oai-amf:v2.0.0
    container_name: oai-amf
    depends_on:
      oai-ausf:
        condition: service_started
      oai-nrf:
        condition: service_healthy
    environment:
      - TZ=Europe/Paris
      - MCC=208
      - MNC=95
      - REGION_ID=128
      - AMF_SET_ID=1
      - SERVED_GUAMI_MCC_0=208
      - SERVED_GUAMI_MNC_0=95
      - SERVED_GUAMI_REGION_ID_0=128
      - SERVED_GUAMI_AMF_SET_ID_0=1
      - PLMN_SUPPORT_MCC=208
      - PLMN_SUPPORT_MNC=95
      - PLMN_SUPPORT_TAC=0x0001
      - SST_0=1
      - SD_0=1
      - AMF_INTERFACE_NAME_FOR_NGAP=eth0
      - AMF_INTERFACE_NAME_FOR_N11=eth0
      - AMF_INTERFACE_PORT_FOR_N11=80
      - AMF_INTERFACE_HTTP2_PORT_FOR_N11=8080
      - SMF_FQDN_0=oai-smf
      - SMF_IPV4_ADDR_0=192.168.70.133
      - SMF_HTTP_VERSION_0=v1
      - REGISTER_NRF=yes
      - NRF_IPV4_ADDRESS=192.168.70.130
      - NRF_PORT=80
      - NRF_API_VERSION=v1
      - NRF_FQDN=oai-nrf
      - NF_REGISTRATION=yes
      - SMF_SELECTION=yes
      - USE_FQDN_DNS=yes
      - EXTERNAL_AUSF=yes
      - EXTERNAL_UDM=no
      - EXTERNAL_NSSF=no
      - USE_HTTP2=no
      - INSTANCE=0
      - LOG_LEVEL=debug
    networks:
      oai-public-net:
        ipv4_address: 192.168.70.132
    healthcheck:
      test: ["CMD-SHELL", "ss -tnlp | grep 8080"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  oai-smf:
    image: oaisoftwarealliance/oai-smf:v2.0.0
    container_name: oai-smf
    depends_on:
      oai-amf:
        condition: service_started
    volumes:
      - ./smf.yaml:/openair-smf/etc/config.yaml:ro
    networks:
      oai-public-net:
        ipv4_address: 192.168.70.133
    restart: unless-stopped

  oai-spgwu:
    image: oaisoftwarealliance/oai-upf:v2.0.0
    container_name: oai-spgwu
    depends_on:
      oai-smf:
        condition: service_started
    volumes:
      - ./upf.yaml:/openair-upf/etc/config.yaml:ro
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    cap_drop:
      - ALL
    privileged: true
    networks:
      oai-public-net:
        ipv4_address: 192.168.70.134
    restart: unless-stopped

  oai-ext-dn:
    image: oaisoftwarealliance/trf-gen-cn5g:latest
    container_name: oai-ext-dn
    entrypoint: /bin/bash -c "ip route add 12.1.1.0/24 via 192.168.70.134 dev eth0 || true && sleep infinity"
    cap_add:
      - NET_ADMIN
    networks:
      oai-public-net:
        ipv4_address: 192.168.70.135
    restart: unless-stopped

networks:
  oai-public-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.70.128/26