log_level:
  general: debug

register_nf:
  general: yes

http_version: 2

upf:
  host: oai-spgwu
  sbi:
    port: 8080
    api_version: v1
    interface_name: eth0
  n3:
    interface_name: eth0
  n4:
    interface_name: eth0
  n6:
    interface_name: eth0

nfs:
  smf:
    host: oai-smf
    n4:
      port: 8805
  nrf:
    host: oai-nrf
    sbi:
      port: 8080
      api_version: v1

dnns:
  - dnn: oai
    pdu_session_type: IPV4
    ipv4_subnet: "12.1.1.0/24"
  - dnn: ims
    pdu_session_type: IPV4V6
    ipv4_subnet: "12.1.1.0/24"